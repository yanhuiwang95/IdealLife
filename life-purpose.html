<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人生意义</title>

  <style>
    /* 顶部重点文章（紧凑左对齐） */
    .top-feature-box {
      max-width: 880px;
      margin: 20px auto 10px;
      padding: 16px 20px;
      background: #f7f3ec;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }

    .top-feature-box ul {
      list-style: none;
      padding-left: 0;
      margin: 0;
      font-family: "Caveat", cursive;
      font-size: 22px;
      line-height: 1.4;
      text-align: left;
    }

    .top-feature-box li {
      margin: 6px 0;
    }

    /* 三列分类（响应式） */
    .category-grid {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
    }

    @media (max-width: 900px) {
      .category-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 650px) {
      .category-grid {
        grid-template-columns: 1fr;
        gap: 24px;
      }
    }

    .category h3 {
      font-size: 26px;
      margin-bottom: 6px;
    }

    .category .category-desc {
      font-size: 14px;
      color: #888;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .category ul {
      padding-left: 20px;
    }
  </style>
</head>

<body>

<!-- 顶部重点区块 -->
<div class="top-feature-box">
  <ul>
    <li>置顶 1：<a href="/reflection/purpose.html">人生意义不是找到的，是一点点活出来的</a></li>
    <li>置顶 2：<a href="/insight/relationship.html">哈佛75年研究告诉我们：关系才是答案</a></li>
    <li>置顶 3：<a href="/insight/philosophers.html">哲学家们如何看</a></li>
  </ul>
</div>

<main>

  <!-- 三列分类 -->
  <section class="category-grid">

    <!-- 洞见 Insight -->
    <div class="category">
      <h3>💡 洞见 Insight</h3>
      <p class="category-desc">哲学与研究带来的启发，别人怎么说</p>
      <ul id="insight-list">
        <li>加载中...</li>
      </ul>
    </div>

    <!-- 反思 Reflection -->
    <div class="category">
      <h3>🪞 反思 Reflection</h3>
      <p class="category-desc">结合自身经历，我怎么看这些问题</p>
      <ul id="reflection-list">
        <li>加载中...</li>
      </ul>
    </div>

    <!-- 叙事 Narrative -->
    <div class="category">
      <h3>📖 叙事 Narrative</h3>
      <p class="category-desc">故事里的人生道理，我经历了什么</p>
      <ul id="narrative-list">
        <li>加载中...</li>
      </ul>
    </div>

  </section>

</main>

<script src="main.js"></script>

<script>
/* 自动加载三个分类的文章列表 */
async function loadCategory(folder, elementId) {
  try {
    const res = await fetch(`${folder}/index.json`);
    const articles = await res.json();

    const ul = document.getElementById(elementId);
    ul.innerHTML = "";

    articles.forEach(a => {
      const li = document.createElement("li");
      li.innerHTML = `<a href="${folder}/${a.file}">${a.title}</a>`;
      ul.appendChild(li);
    });

  } catch (e) {
    document.getElementById(elementId).innerHTML =
      "<li>（未找到文章或 index.json）</li>";
  }
}

loadCategory("meaning-insight", "insight-list");
loadCategory("meaning-reflection", "reflection-list");
loadCategory("meaning-narrative", "narrative-list");
</script>

</body>
</html>
